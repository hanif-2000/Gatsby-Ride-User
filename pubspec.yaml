name: GetsbyRideshare
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  intl: ^0.18.0
  shared_preferences: ^2.2.2
  get_it: ^7.6.7
  dio: ^5.4.1
  connectivity_plus: ^5.0.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  auto_size_text: ^3.0.0
  google_maps_flutter: ^2.5.3
  page_transition: ^2.1.0
  location: ^5.0.3
  geocoding: ^2.2.0
  firebase_messaging: ^14.7.16
  flutter_local_notifications: ^16.3.2
  geolocator: ^11.0.0
  flutter_smart_dialog: ^4.9.6
  image_picker: ^1.0.7
  fluttertoast: ^8.2.4
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.5
  package_info_plus: ^5.0.1
  pinput: ^4.0.0
  flutter_facebook_auth: ^6.1.1
  country_picker: ^2.0.24
  dropdown_button2: ^2.3.9
  http: ^1.2.0
  flutter_svg: ^2.0.10+1
  dotted_line: ^3.2.2
  flutter_facebook_keyhash: ^0.0.4
  flutter_rating_bar: ^4.0.1
  chat_bubbles: any

  percent_indicator: ^4.2.3
  sliding_up_panel: ^2.0.0+1
  flutter_launcher_icons: ^0.13.1
  google_sign_in: ^6.2.1
  web_socket_client: ^0.1.0
 
  # upi_india: ^3.0.1
  # easy_upi_payment: ^0.1.4

  google_directions_api: ^0.10.0
  permission_handler: ^11.3.0
  firebase_auth: ^4.17.4
  flutter_keychain: ^2.4.0
  sign_in_with_apple: ^5.0.0
  app_settings: ^5.1.1
  credit_card_type_detector: ^3.0.0
  month_year_picker: ^0.3.0+1
  lottie: ^3.1.0
  flutter_app_badger: ^1.5.0
  webview_flutter: ^4.7.0
  firebase_core: ^2.25.4
  pay: ^1.1.2
  provider: ^6.1.1
  flutter_widget_from_html: ^0.14.11



dependency_overrides:
  flutter_stripe: ^10.0.0
  stripe_android: "9.5.0+1"

  # credit_card: ^0.1.8
  # upi_pay: ^1.0.1
  # flutter_pay: ^1.0.2



dev_dependencies:
  change_app_package_name: ^1.1.0
  flutter_test:
    sdk: flutter
  google_fonts: ^6.1.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/gatsbyappicon.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/default_google_pay_config.json
    - assets/default_apple_pay_config.json
    - assets/lottie_animation/



  fonts:
    - family: Hiragino Kaku
      fonts:
        - asset: fonts/hiragino_kaku_gothic_pro_W3.ttf
          weight: 300
        - asset: fonts/hiragino_kaku_gothic_pro_W6.ttf
          weight: 600

          
    - family: Hiragino Maru
      fonts:
        - asset: fonts/hiragino_maru_gothic_pro_W4.OTF
          weight: 400

    - family: poPPinBold
      fonts:
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 700
    - family: poPPinSemiBold
      fonts:
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: poPPinMedium
      fonts:
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
    - family: poPPinRegular
      fonts:
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
