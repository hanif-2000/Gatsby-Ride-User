name: GetsbyRideshare
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+10

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  get_it: ^7.7.0
  dio: ^5.6.0
  connectivity_plus: ^6.0.5
  equatable: ^2.0.5
  dartz: ^0.10.1
  auto_size_text: ^3.0.0
  google_maps_flutter: ^2.9.0
  page_transition: ^2.1.0
  location: ^7.0.0
  geocoding: ^3.0.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2
  geolocator: ^12.0.0
  flutter_smart_dialog: ^4.9.8
  image_picker: ^1.1.2
  fluttertoast: ^8.2.6
  cached_network_image: ^3.4.0
  url_launcher: ^6.3.0
  pinput: ^5.0.0
  country_picker: ^2.0.26
  dropdown_button2: ^2.3.9
  http: ^1.2.2
  flutter_svg: ^2.0.10+1
  dotted_line: ^3.2.2
  flutter_rating_bar: ^4.0.1
  chat_bubbles: any
  percent_indicator: ^4.2.3
  sliding_up_panel: ^2.0.0+1
  flutter_launcher_icons: ^0.13.1
  google_sign_in: ^6.2.1
  web_socket_client: ^0.1.4
  permission_handler: ^11.3.1
  firebase_auth: ^5.2.0
  app_settings: ^5.1.1
  credit_card_type_detector: ^3.0.0
  month_year_picker: ^0.4.0+1
  lottie: ^3.1.2
  webview_flutter: ^4.9.0
  firebase_core: ^3.4.0
  pay: ^2.0.0
  provider: ^6.1.2
  flutter_widget_from_html_core: ^0.15.2
  flutter_stripe: ^11.0.0
  google_fonts: any
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/default_google_pay_config.json
    - assets/default_apple_pay_config.json
    - assets/lottie_animation/



  fonts:
    - family: Hiragino Kaku
      fonts:
        - asset: fonts/hiragino_kaku_gothic_pro_W3.ttf
          weight: 300
        - asset: fonts/hiragino_kaku_gothic_pro_W6.ttf
          weight: 600

          
    - family: Hiragino Maru
      fonts:
        - asset: fonts/hiragino_maru_gothic_pro_W4.OTF
          weight: 400

    - family: poPPinBold
      fonts:
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 700
    - family: poPPinSemiBold
      fonts:
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: poPPinMedium
      fonts:
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
    - family: poPPinRegular
      fonts:
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
