name: GetsbyRideshare
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.7.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.5
  intl: ^0.17.0
  shared_preferences: ^2.0.13
  get_it: ^7.2.0
  dio: ^4.0.4
  connectivity_plus: ^2.2.1
  dio_logger: ^4.0.8+8
  equatable: ^2.0.3
  dartz: ^0.10.1
  auto_size_text: ^3.0.0
  google_maps_flutter: ^2.2.1
  page_transition: ^2.0.9
  location: ^4.4.0
  geocoding: ^2.0.5
  firebase_messaging: ^11.4.2
  flutter_local_notifications: ^9.5.3+1
  geolocator: ^9.0.2
  flutter_smart_dialog: ^4.2.0
  image_picker: ^0.8.4+4
  fluttertoast: ^8.0.9
  flutter_html: ^3.0.0-alpha.3
  cached_network_image: ^3.2.0
  url_launcher: ^6.1.11
  package_info_plus: ^1.0.1
  pinput: ^2.2.31
  flutter_facebook_auth: ^5.0.11
  country_picker: ^2.0.20
  dropdown_button2: ^2.1.3
  http: ^0.13.6
  flutter_svg: ^2.0.5
  dotted_line: ^3.1.0
  flutter_facebook_keyhash: ^0.0.4
  flutter_rating_bar: ^4.0.1
  chat_bubbles: any

  percent_indicator: ^4.2.3
  sliding_up_panel: ^2.0.0+1
  flutter_launcher_icons: ^0.11.0
  google_sign_in: ^6.1.4
  firebase_auth: ^3.11.2
  web_socket_client: ^0.1.0-dev.3
 
  # upi_india: ^3.0.1
  # easy_upi_payment: ^0.1.4
  flutter_stripe: ^9.3.0
  # credit_card: ^0.1.8
  # upi_pay: ^1.0.1
  # flutter_pay: ^1.0.2

dependency_overrides:
  provider: ^6.0.3
  firebase_core_platform_interface: 4.5.1
  pay: ^1.1.2

dev_dependencies:
  change_app_package_name: ^1.1.0
  flutter_test:
    sdk: flutter
  google_fonts: ^2.2.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/app_icon.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/default_google_pay_config.json
    - assets/default_apple_pay_config.json



  fonts:
    - family: Hiragino Kaku
      fonts:
        - asset: fonts/hiragino_kaku_gothic_pro_W3.ttf
          weight: 300
        - asset: fonts/hiragino_kaku_gothic_pro_W6.ttf
          weight: 600

          
    - family: Hiragino Maru
      fonts:
        - asset: fonts/hiragino_maru_gothic_pro_W4.OTF
          weight: 400

    - family: poPPinBold
      fonts:
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 700
    - family: poPPinSemiBold
      fonts:
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: poPPinMedium
      fonts:
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
    - family: poPPinRegular
      fonts:
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
