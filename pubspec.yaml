name: appkey_taxiapp_user
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.7.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  get_it: ^7.6.6
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  auto_size_text: ^3.0.0
  google_maps_flutter: ^2.5.2
  page_transition: ^2.1.0
  location: ^5.0.3
  geocoding: ^2.1.1
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0
  geolocator: ^10.1.0
  flutter_smart_dialog: ^4.9.6
  image_picker: ^1.0.7
  fluttertoast: ^8.2.4
  #flutter_html: ^2.2.1
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.3
  package_info_plus: ^5.0.1
  pinput: ^3.0.1
  flutter_facebook_auth: ^6.0.3
  country_picker: ^2.0.23
  dropdown_button2: ^2.3.9
  http: ^1.1.2
  flutter_svg: ^2.0.9
  dotted_line: ^3.2.2
  flutter_facebook_keyhash: ^0.0.4
  flutter_rating_bar: ^4.0.1
  chat_bubbles: any
  flutter_widget_from_html: ^0.14.11

dependency_overrides:
  provider: ^6.1.1
  firebase_core_platform_interface: ^5.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  google_fonts: ^6.1.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo-splash.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Hiragino Kaku
      fonts:
        - asset: fonts/hiragino_kaku_gothic_pro_W3.ttf
          weight: 300
        - asset: fonts/hiragino_kaku_gothic_pro_W6.ttf
          weight: 600
    - family: Hiragino Maru
      fonts:
        - asset: fonts/hiragino_maru_gothic_pro_W4.OTF
          weight: 400

    - family: poPPinBold
      fonts:
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 700
    - family: poPPinSemiBold
      fonts:
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: poPPinMedium
      fonts:
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
    - family: poPPinRegular
      fonts:
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
